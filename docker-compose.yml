services:
  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    container_name: paquego-playwright-mcp
    user: "0:0"
    init: true
    pull_policy: always
    entrypoint:
      - node
    command:
      - cli.js
      - --headless
      - --browser
      - chromium
      - --no-sandbox
      - --host
      - 0.0.0.0
      - --port
      - "8931"
      - --allowed-hosts
      - "*"
      - --output-dir
      - /tmp/playwright-output
      - --save-session
      - --block-service-workers
    ports:
      - "8931:8931"
    volumes:
      - playwright-mcp-output:/tmp/playwright-output
    restart: unless-stopped

volumes:
  playwright-mcp-output: